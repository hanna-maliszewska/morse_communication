name: CppCheck with MISRA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  cppcheck:
    name: CppCheck
    runs-on: ['ubuntu-latest']
    timeout-minutes: 2
    permissions:
        actions: read
        contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CppCheck
        shell: bash
        run: |
          sudo apt-get install cppcheck
          cppcheck --version
          # AUTOMATYCZNY PATCH: Podmieniamy codecs.open na open, aby uciszyć błąd nowego Pythona
          sudo sed -i 's/codecs.open/open/g' /usr/lib/x86_64-linux-gnu/cppcheck/addons/misra.py
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml
      
      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=badBitmaskCheck \
            --suppress=misra-config \
            --suppress=misra-c2012-17.3 \
            --suppress=misra-c2012-8.6 \
            --suppress=misra-c2012-5.9 \
            --suppress=misra-c2012-8.7 \
            --addon=$GITHUB_WORKSPACE/.github/scripts/misra.json \
            --force \
            --inline-suppr \
            --xml \
            --language=c++ \
            $GITHUB_WORKSPACE/kod_zrodlowy/nadajnik/nadajnik.ino \
            $GITHUB_WORKSPACE/kod_zrodlowy/odbiornik/odbiornik.ino \
            2> $GITHUB_WORKSPACE/cppcheck-result.xml
      
      - name: Parse CppCheck results
        shell: bash
        run: |
          python $GITHUB_WORKSPACE/.github/scripts/cppcheck_parser.py $GITHUB_WORKSPACE/cppcheck-result.xml
